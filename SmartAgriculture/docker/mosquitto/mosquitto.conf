# Mosquitto MQTT Broker Configuration for Smart Agriculture Platform

# =============================================================================
# Listener Configuration
# =============================================================================

# Default listener on port 1883 (MQTT over TCP)
listener 1883
allow_anonymous false
password_file /mosquitto/config/init/mosquitto.passwd

# WebSocket listener on port 9001 (for web clients)
listener 9001
protocol websockets
allow_anonymous false
password_file /mosquitto/config/init/mosquitto.passwd

# =============================================================================
# Persistence Configuration
# =============================================================================

persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

# =============================================================================
# Logging Configuration
# =============================================================================

# Log level: 0 (no debug), 1 (error), 2 (warning), 3 (notice), 4 (information), 5 (debug)
log_type error
log_type warning
log_type notice
log_type information

# =============================================================================
# Security Configuration
# =============================================================================

# Allow connections only from local network and Docker network
# listener 1883
# allow_anonymous false

# =============================================================================
# Message and Connection Limits
# =============================================================================

# Maximum message size (256 KB)
message_size_limit 262144

# Maximum inflight messages per client
max_inflight_messages 1024

# Maximum keepalive interval (60 seconds)
keepalive_interval 60

# =============================================================================
# Bridge Configuration (for future scalability)
# =============================================================================

# connection bridge-to-cloud
# address cloud-broker.example.com:8883
# topic sensors/# 2 0 "" "agriculture/sensors/#"

# =============================================================================
# Authentication and Authorization
# =============================================================================

# ACL (Access Control List) file
acl_file /mosquitto/config/init/mosquitto.acl

# =============================================================================
# Performance Tuning
# =============================================================================

# Maximum number of queued messages
max_queued_messages 1000

# Retain messages
retain_available true

# =============================================================================
# System Integration
# =============================================================================

# Autosave interval (in seconds)
autosave_interval 1800

# Queue QoS 0 messages when connection is lost
queue_qos0_messages false

listener 1883

allow_anonymous true

persistence true

persistence_location /mosquitto/data