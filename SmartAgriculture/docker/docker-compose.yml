version: '3.8'

services:
  # Mosquitto MQTT Broker for sensor data ingestion
  mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: smart-agri-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./init:/mosquitto/config/init
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - smart-agri-network
    restart: unless-stopped

  # PostgreSQL database for structured data
  postgres:
    image: postgres:15.4
    container_name: smart-agri-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartagri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartagri123}
      POSTGRES_DB: ${POSTGRES_DB:-smartagriculture}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - smart-agri-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartagri}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # TimescaleDB extension for time-series data
  timescaledb:
    image: timescale/timescaledb:2.11.2-pg15
    container_name: smart-agri-timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartagri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartagri123}
      POSTGRES_DB: ${POSTGRES_DB:-smartagriculture}
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - smart-agri-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # MongoDB for semi-structured and document data
  mongodb:
    image: mongo:7.0.4
    container_name: smart-agri-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-smartagri}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-smartagri123}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-smartagriculture}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./init/mongodb-init.js:/docker-entrypoint-initdb.d/init.js
    networks:
      - smart-agri-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and message queuing
  redis:
    image: redis:7.2.3-alpine
    container_name: smart-agri-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - smart-agri-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway and Backend Service
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: smart-agri-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-smartagri}:${POSTGRES_PASSWORD:-smartagri123}@postgres:5432/${POSTGRES_DB:-smartagriculture}
      - TIMESCALE_URL=postgresql://${POSTGRES_USER:-smartagri}:${POSTGRES_PASSWORD:-smartagri123}@timescaledb:5432/${POSTGRES_DB:-smartagriculture}
      - MONGODB_URL=mongodb://${MONGO_USER:-smartagri}:${MONGO_PASSWORD:-smartagri123}@mongodb:27017/${MONGO_DB:-smartagriculture}
      - REDIS_URL=redis://redis:6379/0
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
    volumes:
      - ../data:/app/data
      - ../models:/app/models
    networks:
      - smart-agri-network
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_started
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped

  # Data Ingestion Service
  ingestion:
    build:
      context: ../ingestion
      dockerfile: Dockerfile
    container_name: smart-agri-ingestion
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - DATABASE_URL=postgresql://${POSTGRES_USER:-smartagri}:${POSTGRES_PASSWORD:-smartagri123}@postgres:5432/${POSTGRES_DB:-smartagriculture}
      - TIMESCALE_URL=postgresql://${POSTGRES_USER:-smartagri}:${POSTGRES_PASSWORD:-smartagri123}@timescaledb:5432/${POSTGRES_DB:-smartagriculture}
      - MONGODB_URL=mongodb://${MONGO_USER:-smartagri}:${MONGO_PASSWORD:-smartagri123}@mongodb:27017/${MONGO_DB:-smartagriculture}
    volumes:
      - ../data/raw:/app/data/raw
      - ../sensors:/app/sensors
    networks:
      - smart-agri-network
    depends_on:
      - mosquitto
      - postgres
      - timescaledb
      - mongodb
    restart: unless-stopped

  # Data Preprocessing Service
  preprocessing:
    build:
      context: ../preprocessing
      dockerfile: Dockerfile
    container_name: smart-agri-preprocessing
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-smartagri}:${POSTGRES_PASSWORD:-smartagri123}@postgres:5432/${POSTGRES_DB:-smartagriculture}
      - TIMESCALE_URL=postgresql://${POSTGRES_USER:-smartagri}:${POSTGRES_PASSWORD:-smartagri123}@timescaledb:5432/${POSTGRES_DB:-smartagriculture}
    volumes:
      - ../data/raw:/app/data/raw
      - ../data/processed:/app/data/processed
    networks:
      - smart-agri-network
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_started
    restart: unless-stopped

  # Semantic Enrichment Service
  semantic:
    build:
      context: ../semantic
      dockerfile: Dockerfile
    container_name: smart-agri-semantic
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-smartagri}:${POSTGRES_PASSWORD:-smartagri123}@postgres:5432/${POSTGRES_DB:-smartagriculture}
      - MONGODB_URL=mongodb://${MONGO_USER:-smartagri}:${MONGO_PASSWORD:-smartagri123}@mongodb:27017/${MONGO_DB:-smartagriculture}
    volumes:
      - ../data/processed:/app/data/processed
      - ../data/results:/app/data/results
    networks:
      - smart-agri-network
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # Analytics and ML Service
  analytics:
    build:
      context: ../analytics
      dockerfile: Dockerfile
    container_name: smart-agri-analytics
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-smartagri}:${POSTGRES_PASSWORD:-smartagri123}@postgres:5432/${POSTGRES_DB:-smartagriculture}
      - TIMESCALE_URL=postgresql://${POSTGRES_USER:-smartagri}:${POSTGRES_PASSWORD:-smartagri123}@timescaledb:5432/${POSTGRES_DB:-smartagriculture}
      - MONGODB_URL=mongodb://${MONGO_USER:-smartagri}:${MONGO_PASSWORD:-smartagri123}@mongodb:27017/${MONGO_DB:-smartagriculture}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ../data/processed:/app/data/processed
      - ../data/models:/app/data/models
      - ../data/results:/app/data/results
    networks:
      - smart-agri-network
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_started
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Dashboard Frontend
  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: smart-agri-dashboard
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8000
    volumes:
      - ../data/results:/app/data/results
    networks:
      - smart-agri-network
    depends_on:
      - api
    restart: unless-stopped

  # Neo4j Graph Database for relationship analysis
  neo4j:
    image: neo4j:5.15.0
    container_name: smart-agri-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - ./init/neo4j-init:/var/lib/neo4j/import
    networks:
      - smart-agri-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-password} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper for Kafka coordination
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: smart-agri-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - smart-agri-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka for event streaming
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: smart-agri-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - smart-agri-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana for monitoring and visualization
  grafana:
    image: grafana/grafana:10.2.2
    container_name: smart-agri-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - smart-agri-network
    restart: unless-stopped
    depends_on:
      - postgres
      - timescaledb
      - prometheus

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: smart-agri-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - smart-agri-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'

volumes:
  postgres_data:
  timescale_data:
  mongodb_data:
  redis_data:
  mosquitto_data:
  mosquitto_logs:
  neo4j_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  grafana_data:
  prometheus_data:

networks:
  smart-agri-network:
    driver: bridge